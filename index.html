<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEEP SEA LAB | 深海ラボ</title>
    <meta
      name="description"
      content="DEEP SEA LAB - 深海ラボの拠点MVP（背景・部屋切替・A/B/C表示枠・タップ反応の受け口）"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="glass-panel top-bar">
        <div class="brand">
          <p class="brand-main">DEEP SEA LAB</p>
          <p class="brand-sub">深海ラボ / 拠点MVP</p>
        </div>
        <nav class="room-menu" aria-label="部屋切替">
          <button class="menu-button is-active" data-room="living">生活区</button>
          <button class="menu-button" data-room="control">制御室</button>
        </nav>
      </header>

      <main class="map-stage-wrap">
        <section id="mapStage" class="map-stage" role="img" aria-label="深海ラボ背景">
          <div class="ocean-overlay" aria-hidden="true"></div>
          <div class="frames-layer" id="framesLayer">
            <button class="frame frame-a" data-character="A" aria-label="研究員A枠">A</button>
            <button class="frame frame-b" data-character="B" aria-label="研究員B枠">B</button>
            <button class="frame frame-c" data-character="C" aria-label="研究員C枠">C</button>
          </div>
        </section>
      </main>

      <aside class="glass-panel status-panel" aria-live="polite">
        <p class="status-title">システムログ</p>
        <p id="statusText">初期化完了。部屋を切替、または A/B/C をタップしてください。</p>
      </aside>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
